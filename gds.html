<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GDS Command Center</title>

<style>

body {
font-family: Arial;
background-color: #f4f7fb;
padding: 20px;
}

h1 {
color: #0b2545;
}

.search-box {
width: 100%;
padding: 10px;
margin-bottom: 20px;
border-radius: 6px;
border: 1px solid #ccc;
}

.command-card {
background-color: white;
padding: 15px;
margin-bottom: 10px;
border-radius: 8px;
box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.command-title {
font-weight: bold;
color: #0b2545;
}

.command-example {
color: #444;
font-size: 14px;
margin-top: 5px;
}

</style>

</head>

<body>

<h1>✈ GDS Command Center</h1>

<input 
type="text"
class="search-box"
placeholder="Search command..."
onkeyup="searchCommand()"
id="searchInput"
/>

<div id="commandList">

<div class="command-card">
<div class="command-title">NM1</div>
<div>Add Passenger Name</div>
<div class="command-example">
Example: NM1AHMAD/ZUBAIR
</div>
</div>

<div class="command-card">
<div class="command-title">SS</div>
<div>Sell Flight Segment</div>
<div class="command-example">
Example: SS1Y1
</div>
</div>

<div class="command-card">
<div class="command-title">ER</div>
<div>End and Retrieve PNR</div>
<div class="command-example">
Example: ER
</div>
</div>

<div class="command-card">
<div class="command-title">TRF</div>
<div>Refund Ticket</div>
<div class="command-example">
Example: TRF123-4567890123
</div>
</div>

</div>

<script>

function searchCommand() {

let input = document
.getElementById("searchInput")
.value.toLowerCase();

let cards = document
.getElementsByClassName("command-card");

for (let i = 0; i < cards.length; i++) {

let text = cards[i].innerText.toLowerCase();

if (text.includes(input)) {

cards[i].style.display = "";

} else {

cards[i].style.display = "none";

}

}

}

</script>

</body>

</html>
