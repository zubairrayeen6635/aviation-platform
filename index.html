<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aviation Professional Toolkit</title>

<style>

body {
margin: 0;
font-family: Arial, sans-serif;
background-color: #f4f7fb;
}

/* Sidebar */

.sidebar {
position: fixed;
left: 0;
top: 0;
width: 240px;
height: 100%;
background-color: #0b2545;
color: white;
padding-top: 20px;
}

.sidebar h2 {
text-align: center;
margin-bottom: 20px;
}

.sidebar a {
display: block;
padding: 12px 20px;
color: white;
text-decoration: none;
font-size: 14px;
}

.sidebar a:hover {
background-color: #133c73;
}

/* Main */

.main {
margin-left: 240px;
padding: 20px;
}

/* Header */

.header {
background-color: white;
padding: 15px;
border-radius: 8px;
margin-bottom: 20px;
box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.search-box {
width: 100%;
padding: 10px;
border-radius: 6px;
border: 1px solid #ccc;
}

/* Cards */

.cards {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 20px;
}

.card {
background-color: white;
padding: 20px;
border-radius: 10px;
box-shadow: 0 2px 6px rgba(0,0,0,0.1);
cursor: pointer;
transition: 0.2s;
}

.card:hover {
transform: translateY(-3px);
}

/* Modules */

.module {
display: none;
background-color: white;
padding: 20px;
border-radius: 10px;
box-shadow: 0 2px 6px rgba(0,0,0,0.1);
margin-top: 20px;
}

.result-item {
padding: 12px;
border-bottom: 1px solid #eee;
}

.command-title {
font-weight: bold;
color: #0b2545;
font-size: 16px;
}

.command-desc {
font-size: 13px;
color: #555;
}

.command-cat {
font-size: 12px;
color: #888;
margin-top: 3px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h2>✈ Aviation</h2>

<a href="#" onclick="showDashboard()">Dashboard</a>
<a href="#" onclick="openModule('gds')">GDS Commands</a>

</div>

<!-- Main -->

<div class="main">

<div class="header">

<input 
type="text" 
class="search-box" 
placeholder="Search commands..."
>

</div>

<!-- Dashboard -->

<div id="dashboard" class="cards">

<div class="card" onclick="openModule('gds')">

<h3>🖥 GDS Command Center</h3>
<p>Professional Command Search</p>

</div>

</div>

<!-- GDS Module -->

<div id="gdsModule" class="module">

<h2>GDS Command Search</h2>

<input 
type="text"
id="gdsSearch"
placeholder="Type command like AN, NM, FXP..."
onkeyup="searchCommand()"
class="search-box"
>

<div id="resultBox"></div>

</div>

</div>

<script>

/* Categorized Commands */

const commands = [

/* Availability */

{ name:"AN", desc:"Availability Neutral", cat:"Availability" },
{ name:"DO", desc:"Display Flight Info", cat:"Availability" },

/* PNR Creation */

{ name:"NM", desc:"Name Entry", cat:"PNR Creation" },
{ name:"AP", desc:"Add Phone Contact", cat:"PNR Creation" },
{ name:"RF", desc:"Received From", cat:"PNR Creation" },
{ name:"ER", desc:"End and Retrieve", cat:"PNR Creation" },
{ name:"ET", desc:"End Transaction", cat:"PNR Creation" },
{ name:"RT", desc:"Retrieve PNR", cat:"PNR Creation" },
{ name:"IG", desc:"Ignore PNR", cat:"PNR Creation" },

/* Ticketing */

{ name:"FXP", desc:"Price Itinerary", cat:"Ticketing" },
{ name:"FXB", desc:"Best Buy Pricing", cat:"Ticketing" },
{ name:"TTP", desc:"Issue Ticket", cat:"Ticketing" },
{ name:"TKTL", desc:"Ticket Time Limit", cat:"Ticketing" },

/* Queue */

{ name:"QP", desc:"Queue Place", cat:"Queue" },
{ name:"QI", desc:"Queue Ignore", cat:"Queue" },
{ name:"QR", desc:"Queue Remove", cat:"Queue" },

/* SSR */

{ name:"SR", desc:"Add Special Service Request", cat:"SSR/OSI" },
{ name:"OSI", desc:"Other Service Info", cat:"SSR/OSI" },

/* Remarks */

{ name:"RM", desc:"Add Remark", cat:"Remarks" },
{ name:"FE", desc:"Fare Endorsement", cat:"Remarks" },

/* Refund */

{ name:"TRF", desc:"Refund Ticket", cat:"Refund" }

];

/* Navigation */

function showDashboard(){

document.getElementById("dashboard").style.display = "grid";
document.getElementById("gdsModule").style.display = "none";

}

function openModule(module){

document.getElementById("dashboard").style.display = "none";

if(module === "gds"){

document.getElementById("gdsModule").style.display = "block";

}

}

/* Search */

function searchCommand(){

let input =
document.getElementById("gdsSearch")
.value.toUpperCase();

let result = commands.filter(c =>
c.name.includes(input)
);

let output = "";

result.forEach(c=>{

output += `
<div class="result-item">

<div class="command-title">
${c.name}
</div>

<div class="command-desc">
${c.desc}
</div>

<div class="command-cat">
Category: ${c.cat}
</div>

</div>
`;

});

document.getElementById("resultBox").innerHTML = output;

}

</script>

</body>

</html>
