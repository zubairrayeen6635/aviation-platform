<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aviation Professional Toolkit</title>

<style>

body {
margin: 0;
font-family: Arial, sans-serif;
background-color: #f4f7fb;
}

/* Sidebar */

.sidebar {
position: fixed;
left: 0;
top: 0;
width: 240px;
height: 100%;
background-color: #0b2545;
color: white;
padding-top: 20px;
}

.sidebar h2 {
text-align: center;
margin-bottom: 20px;
}

.sidebar a {
display: block;
padding: 12px 20px;
color: white;
text-decoration: none;
font-size: 14px;
}

.sidebar a:hover {
background-color: #133c73;
}

/* Main */

.main {
margin-left: 240px;
padding: 20px;
}

/* Header */

.header {
background-color: white;
padding: 15px;
border-radius: 8px;
margin-bottom: 20px;
box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* Search */

.search-box {
width: 100%;
padding: 10px;
border-radius: 6px;
border: 1px solid #ccc;
}

/* Cards */

.cards {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 20px;
}

.card {
background-color: white;
padding: 20px;
border-radius: 10px;
box-shadow: 0 2px 6px rgba(0,0,0,0.1);
cursor: pointer;
transition: 0.2s;
}

.card:hover {
transform: translateY(-3px);
}

.card h3 {
margin: 0;
font-size: 16px;
color: #0b2545;
}

.card p {
font-size: 13px;
color: #666;
}

/* Modules */

.module {
display: none;
background-color: white;
padding: 20px;
border-radius: 10px;
box-shadow: 0 2px 6px rgba(0,0,0,0.1);
margin-top: 20px;
}

.result-item {
padding: 10px;
border-bottom: 1px solid #eee;
}

.command-title {
font-weight: bold;
color: #0b2545;
}

.command-desc {
font-size: 13px;
color: #555;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h2>✈ Aviation</h2>

<a href="#" onclick="showDashboard()">Dashboard</a>
<a href="#" onclick="openModule('gds')">GDS Commands</a>

</div>

<!-- Main -->

<div class="main">

<div class="header">

<input 
type="text" 
class="search-box" 
placeholder="Search commands, airlines, airports..."
>

</div>

<!-- Dashboard -->

<div id="dashboard" class="cards">

<div class="card" onclick="openModule('gds')">

<h3>🖥 GDS Command Center</h3>
<p>Search Amadeus Commands</p>

</div>

</div>

<!-- GDS Module -->

<div id="gdsModule" class="module">

<h2>GDS Command Search</h2>

<input 
type="text"
id="gdsSearch"
placeholder="Type command like AN, NM, FXP..."
onkeyup="searchCommand()"
class="search-box"
>

<div id="resultBox"></div>

</div>

</div>

<script>

/* Real GDS Commands */

const commands = [

{ name:"AN", desc:"Availability Neutral" },
{ name:"SS", desc:"Sell Seat" },
{ name:"NM", desc:"Name Entry" },
{ name:"AP", desc:"Add Phone Contact" },
{ name:"TKTL", desc:"Ticket Time Limit" },
{ name:"RF", desc:"Received From" },
{ name:"ER", desc:"End and Retrieve" },
{ name:"ET", desc:"End Transaction" },
{ name:"IG", desc:"Ignore PNR" },
{ name:"RT", desc:"Retrieve PNR" },

{ name:"FXP", desc:"Price Itinerary" },
{ name:"FXB", desc:"Best Buy Pricing" },
{ name:"TTP", desc:"Issue Ticket" },
{ name:"TRF", desc:"Refund Ticket" },

{ name:"HE", desc:"Help Entry" },
{ name:"HE AN", desc:"Help for Availability" },

{ name:"DO", desc:"Display Flight Info" },
{ name:"MD", desc:"Move Down Screen" },
{ name:"MU", desc:"Move Up Screen" },

{ name:"QP", desc:"Queue Place" },
{ name:"QI", desc:"Queue Ignore" },
{ name:"QR", desc:"Queue Remove" },

{ name:"SR", desc:"Add Special Service Request" },
{ name:"OSI", desc:"Other Service Info" },

{ name:"RM", desc:"Add Remark" },
{ name:"FE", desc:"Fare Endorsement" }

];

/* Show Dashboard */

function showDashboard(){

document.getElementById("dashboard").style.display = "grid";

document.getElementById("gdsModule").style.display = "none";

}

/* Open Module */

function openModule(module){

document.getElementById("dashboard").style.display = "none";

if(module === "gds"){

document.getElementById("gdsModule").style.display = "block";

}

}

/* Search Command */

function searchCommand(){

let input =
document.getElementById("gdsSearch")
.value.toUpperCase();

let result = commands.filter(c =>
c.name.includes(input)
);

let output = "";

result.forEach(c=>{

output += `
<div class="result-item">

<div class="command-title">
${c.name}
</div>

<div class="command-desc">
${c.desc}
</div>

</div>
`;

});

document.getElementById("resultBox").innerHTML = output;

}

</script>

</body>

</html>
