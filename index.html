<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aviation Professional Toolkit</title>

<style>

body {
margin: 0;
font-family: Arial, sans-serif;
background-color: #f4f7fb;
}

/* Sidebar */

.sidebar {
position: fixed;
left: 0;
top: 0;
width: 240px;
height: 100%;
background-color: #0b2545;
color: white;
padding-top: 20px;
}

.sidebar h2 {
text-align: center;
margin-bottom: 20px;
}

.sidebar a {
display: block;
padding: 12px 20px;
color: white;
text-decoration: none;
font-size: 14px;
cursor: pointer;
}

.sidebar a:hover {
background-color: #133c73;
}

/* Main */

.main {
margin-left: 240px;
padding: 20px;
}

/* Header */

.header {
background-color: white;
padding: 15px;
border-radius: 8px;
margin-bottom: 20px;
box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* Cards */

.cards {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 20px;
}

.card {
background-color: white;
padding: 20px;
border-radius: 10px;
box-shadow: 0 2px 6px rgba(0,0,0,0.1);
cursor: pointer;
transition: 0.2s;
}

.card:hover {
transform: translateY(-3px);
}

/* Modules */

.module {
display: none;
background-color: white;
padding: 20px;
border-radius: 10px;
box-shadow: 0 2px 6px rgba(0,0,0,0.1);
margin-top: 20px;
}

/* Search */

.search-box {
width: 100%;
padding: 10px;
border-radius: 6px;
border: 1px solid #ccc;
}

/* Results */

.result-item {
padding: 12px;
border-bottom: 1px solid #eee;
cursor: pointer;
}

.result-item:hover {
background-color: #f1f5fb;
}

.command-title {
font-weight: bold;
color: #0b2545;
}

.command-cat {
font-size: 12px;
color: #777;
}

/* Popup */

.popup {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.5);
}

.popup-content {
background: white;
padding: 20px;
margin: 10% auto;
width: 420px;
border-radius: 10px;
}

.close-btn {
float: right;
cursor: pointer;
font-weight: bold;
color: red;
}

.back-btn {
margin-bottom: 10px;
padding: 8px 14px;
background-color: #0b2545;
color: white;
border: none;
border-radius: 6px;
cursor: pointer;
}

.back-btn:hover {
background-color: #133c73;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h2>✈ Aviation Toolkit</h2>

<a onclick="showDashboard()">Dashboard</a>
<a onclick="openModule('gds')">GDS Commands</a>

</div>

<div class="main">

<div class="header">

<h2>Professional Aviation Toolkit</h2>

</div>

<!-- Dashboard -->

<div id="dashboard" class="cards">

<div class="card" onclick="openModule('gds')">

<h3>🖥 GDS Command Center</h3>
<p>Search professional commands</p>

</div>

</div>

<!-- GDS MODULE -->

<div id="gdsModule" class="module">

<button class="back-btn" onclick="showDashboard()">← Back</button>

<h2>GDS Command Search</h2>

<input 
type="text"
id="gdsSearch"
placeholder="Search command like AN, NM, FXP..."
onkeyup="searchCommand()"
class="search-box"
>

<div id="resultBox"></div>

</div>

</div>

<!-- Popup -->

<div id="popup" class="popup">

<div class="popup-content">

<span class="close-btn" onclick="closePopup()">X</span>

<h3 id="popTitle"></h3>

<p id="popDesc"></p>

<p id="popSyntax"></p>

<p id="popExample"></p>

<p id="popCategory"></p>

</div>

</div>

<script>

/* MASTER COMMAND DATABASE */

const commands = [

{
name:"AN",
desc:"Availability Neutral",
syntax:"AN DEL BOM 10JUN",
example:"AN DEL BOM 10JUN",
cat:"Availability"
},

{
name:"NM",
desc:"Name Entry",
syntax:"NM1KHAN/ZUBAIR MR",
example:"NM1AHMAD/ALI MR",
cat:"PNR Creation"
},

{
name:"SS",
desc:"Sell Seat",
syntax:"SS1Y1",
example:"SS1Y1",
cat:"Booking"
},

{
name:"AP",
desc:"Add Phone Contact",
syntax:"AP 9876543210",
example:"AP DEL 9876543210",
cat:"PNR Creation"
},

{
name:"FXP",
desc:"Price Itinerary",
syntax:"FXP",
example:"FXP",
cat:"Ticketing"
},

{
name:"TTP",
desc:"Issue Ticket",
syntax:"TTP",
example:"TTP",
cat:"Ticketing"
},

{
name:"TKTL",
desc:"Ticket Time Limit",
syntax:"TKTL/20APR",
example:"TKTL/20APR",
cat:"Ticketing"
},

{
name:"RF",
desc:"Received From",
syntax:"RF ZUBAIR",
example:"RF AHMED",
cat:"PNR Creation"
},

{
name:"ER",
desc:"End and Retrieve",
syntax:"ER",
example:"ER",
cat:"PNR Creation"
},

{
name:"RT",
desc:"Retrieve PNR",
syntax:"RT ABC123",
example:"RT XYZ456",
cat:"PNR Creation"
}

];

/* NAVIGATION */

function showDashboard(){

document.getElementById("dashboard").style.display="grid";
document.getElementById("gdsModule").style.display="none";

}

function openModule(module){

document.getElementById("dashboard").style.display="none";

if(module==="gds"){

document.getElementById("gdsModule").style.display="block";

}

}

/* SEARCH */

function searchCommand(){

let input =
document.getElementById("gdsSearch")
.value.toUpperCase();

let result =
commands.filter(c =>
c.name.includes(input)
);

let output="";

result.forEach(c=>{

output += `
<div class="result-item"
onclick="showPopup('${c.name}')">

<div class="command-title">
${c.name} — ${c.desc}
</div>

<div class="command-cat">
Category: ${c.cat}
</div>

</div>
`;

});

document.getElementById("resultBox").innerHTML=output;

}

/* POPUP */

function showPopup(cmd){

let command =
commands.find(c=>c.name===cmd);

document.getElementById("popTitle")
.innerHTML=command.name;

document.getElementById("popDesc")
.innerHTML="Description: "+command.desc;

document.getElementById("popSyntax")
.innerHTML="Syntax: "+command.syntax;

document.getElementById("popExample")
.innerHTML="Example: "+command.example;

document.getElementById("popCategory")
.innerHTML="Category: "+command.cat;

document.getElementById("popup").style.display="block";

}

function closePopup(){

document.getElementById("popup").style.display="none";

}

</script>

</body>

</html>
